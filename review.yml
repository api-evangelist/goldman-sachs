reviewer: API Evangelist
date: '2026-07-23'
provider: Goldman Sachs
slug: goldman-sachs
domain: goldmansachs.com
tier: money-center
segment: US money-center investment bank (institutional / wholesale)
summary: >-
  Goldman Sachs runs a real but institution-gated public developer surface split
  across three programs: the Marquee digital platform (developer.gs.com /
  marquee.gs.com), the Transaction Banking (TxB) embedded-banking APIs, and the
  RIA Custody (GS Custody Solutions) REST APIs. Documentation is public and
  detailed, but production access to every program is gated to institutional
  clients and approved partners — there is no self-serve consumer open-finance
  API. No downloadable OpenAPI/Swagger specifications are published; all
  reference material is HTML-only. The one self-serve-installable artifact is the
  open-source GS Quant Python toolkit on GitHub, which wraps the Marquee
  pricing/risk/data APIs.
developer_portal: https://developer.gs.com/
documentation: https://developer.gs.com/docs/
github_org: https://github.com/goldmansachs
findings:
  - area: Developer portal
    detail: >-
      developer.gs.com is a real, well-organized developer portal with a
      discover section (banking, txb, data) and per-service docs trees. It
      returned connection failures to automated crawlers from this environment
      (curl 000 / WebFetch timeout) but is confirmed live and content-rich via
      search indexing; marquee.gs.com returned HTTP 200.
  - area: Documented API programs
    detail: >-
      Three distinct real programs. (1) Marquee: Content, Pricing & Risk,
      Hedging, Index, Portfolio and Data services, plus the open-source GS Quant
      Python toolkit. (2) Transaction Banking (TxB): virtual accounts, payments/
      collections and balance & transaction reporting. (3) RIA Custody (GSCS):
      REST APIs for advisor firms covering onboarding, data files and ACH/wire.
  - area: Downloadable specs
    detail: >-
      None. No public OpenAPI/Swagger/Postman is published for any program; all
      documentation is HTML-only and, for production, institution-gated. No
      specs were harvested. The goldmansachs GitHub org hosts gs-quant (a Python
      toolkit), not a machine-readable API description.
  - area: Authentication
    detail: >-
      Varies by program. Marquee / GS Quant use OAuth 2.0 application
      credentials (client_id / client_secret via a GsSession), issued to
      institutional clients. TxB uses mutual TLS plus IP allowlisting with
      per-call JWT step-up authentication (documented test base
      api.test.txb.gs.com). RIA Custody uses OAuth 2.0 with a clientId/
      clientSecret provisioned by GSCS after approval via Lockbox or secure
      email.
  - area: Base URLs
    detail: >-
      Marquee / GS Quant APIs are served from api.marquee.gs.com. TxB is served
      from api.txb.gs.com (test: api.test.txb.gs.com). RIA Custody documents a
      REST resource model but does not publish a stable production base host
      publicly.
  - area: FDX / CFPB 1033 / aggregator posture
    detail: >-
      Goldman Sachs is primarily an institutional/wholesale firm and is winding
      down its consumer footprint (Marcus / the Apple Card partnership is being
      exited). It publishes no first-party consumer open-finance (FDX / CFPB
      1033) developer API; any consumer deposit data access has historically run
      through third-party aggregators rather than a Goldman-hosted data-access
      API. The public developer surface is deliberately institutional (Marquee,
      TxB, RIA Custody), not retail open-banking.
  - area: Honesty note
    detail: >-
      Every apis[] entry maps to a real, documented Goldman Sachs API program or
      the real GS Quant toolkit, with verified humanURLs on developer.gs.com /
      marquee.gs.com / github.com/goldmansachs. Base URLs and auth models are
      taken from public documentation. Nothing was fabricated and no spec was
      invented; specs_harvested = 0 because none are publicly downloadable.
