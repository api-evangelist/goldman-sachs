aid: goldman-sachs
name: Goldman Sachs
kind: company
description: >-
  Goldman Sachs is a leading global money-center investment bank and financial
  services firm. Its public developer surface is institutional and
  professional-client oriented, spanning the Marquee digital platform (content,
  pricing and risk, hedging, indices, portfolio, and market-data services plus
  the open-source GS Quant Python toolkit), the Transaction Banking (TxB)
  embedded-banking APIs for virtual accounts, payments and reporting across
  Fedwire/ACH/SWIFT rails, and the RIA Custody (GS Custody Solutions) REST APIs
  for advisor firms. Access is gated to institutional clients and approved
  partners; there is no self-serve consumer open-finance API.
