specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Goldman Sachs
providerId: goldman-sachs
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Banking
  - Capital Markets
description: Goldman Sachs API surfaces (Marquee, Transaction Banking) do not publish numeric public rate
  limits. Limits are governed by the institutional client agreement, applied per service and per client
  account, and may differ between market-data feeds (high-frequency) and transaction-banking endpoints
  (lower-frequency, idempotent).
notes: Reconcile when Goldman Sachs publishes per-product rate-limit numbers.
sources:
  - https://developer.gs.com/
  - https://marquee.gs.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Marquee API (institutional)
    scope: client
    metric: varies
    limit: see Marquee client agreement
  - name: Transaction Banking API (corporate account)
    scope: client
    metric: varies
    limit: see TxB client agreement
policies:
  - name: Backoff Strategy
    description: Exponential backoff with jitter on 429 / 503 responses.
  - name: Idempotency
    description: Use idempotency keys on payment-creation endpoints to prevent duplicate execution on
      retry.
  - name: Bilateral terms
    description: Quotas are negotiated as part of the institutional services agreement and may include
      mutually agreed burst windows.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
