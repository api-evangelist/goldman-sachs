specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Goldman Sachs
providerId: goldman-sachs
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Banking
  - Capital Markets
description: 'FOCUS-aligned FinOps framing for Goldman Sachs institutional API products: Marquee data
  & analytics subscriptions and Transaction Banking transaction fees. Specific rates are bilateral and
  not publicly posted.'
notes: Reconcile once published rate cards exist.
sources:
  - https://www.goldmansachs.com/
  - https://developer.gs.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: The Goldman Sachs Group, Inc.
serviceCategory: Banking / Capital Markets
billingModel:
  pricingCategory: Subscription + Transaction Fees
  billingFrequency: Monthly
  billingCurrency: USD (settlement varies)
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
focusColumns:
  ServiceName: Goldman Sachs
  ServiceCategory: Banking
  ProviderName: Goldman Sachs
  PublisherName: The Goldman Sachs Group, Inc.
  InvoiceIssuerName: Goldman Sachs Bank USA
  BillingCurrency: USD
meters:
  - name: marquee_subscription
    description: Marquee data / analytics subscription
    unit: month
    aggregation: sum
    dimensions:
      - product
      - data_set
  - name: txb_payments
    description: Payment instructions executed via Transaction Banking
    unit: transaction
    aggregation: sum
    dimensions:
      - rail
      - currency
  - name: txb_fx_volume
    description: FX execution volume
    unit: USD
    aggregation: sum
    dimensions:
      - currency_pair
  - name: account_maintenance
    description: Corporate / virtual account maintenance fees
    unit: account-month
    aggregation: sum
principles:
  - name: Visibility
    description: Reconcile Goldman Sachs invoices and Marquee usage exports against ledger; surface TxB
      payment volumes via the TxB reporting API.
  - name: Allocation
    description: Allocate Marquee subscription cost to the consuming desk; TxB payment fees to the originating
      product.
  - name: Optimization
    description: Right-size Marquee data-set entitlements; route low-value payments to cheaper rails;
      consolidate accounts to qualify for relationship pricing.
  - name: Accountability
    description: Front-office desks own Marquee spend; corporate treasury owns TxB spend; finance reviews
      monthly statements.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
